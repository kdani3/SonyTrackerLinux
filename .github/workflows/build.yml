name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sony-tracker
          path: sony-tracker

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sony-tracker

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: sony-tracker
